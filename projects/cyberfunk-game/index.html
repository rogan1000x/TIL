<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEOUL-2077 / HANGUL BREACH</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="start-screen">
    <h1>SEOUL-2077</h1>
    <h2>HANGUL BREACH</h2>
    <p>흘러내리는 한글을 타이핑해서 막아라</p>
    <p style="font-size: 14px; color: rgba(255, 45, 155, 0.7);">
      최고 점수: <span id="best-score-start">0</span>
    </p>
    <button id="start-btn">[ 게임 시작 ]</button>
  </div>

  <div id="game-container">
    <div id="countdown">
    <div id="countdown-text">3</div>
  </div>
<div id="gameover">
  <h1>GAME OVER</h1>
  <p>최종 점수: <span id="final-score">0</span></p>
  <p style="font-size: 16px; color: #00ffff;">
    최고 점수: <span id="best-score">0</span>
  </p>
  <button id="restart-btn">[ 재시작 ]</button>
  <button id="screenshot-btn">[ 스크린샷 저장 ]</button>  <!-- ← 이 줄 추가 -->
</div>

    <div id="hud">
      <span>SCORE: <strong id="score">0</strong></span>
      <span>LEVEL: <strong id="level">1</strong></span>
      <span>COMBO: <strong id="combo">x1</strong></span>
      <span>DIFFICULTY: <strong id="difficulty">EASY</strong></span>
      <span>HP: <strong id="hp">100</strong></span>
    </div>

    <div id="game-area">
      <!-- 단어들이 여기서 떨어져 -->
    </div>

    <div id="input-zone">
      <input type="text" id="type-input" placeholder="여기에 타이핑..." autocomplete="off" />
    </div>

  </div>

  <script src="words.js"></script>
  <script src="script.js"></script>
</body>

</html>
