<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEOUL-2077 / HANGUL BREACH</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="start-screen">
    <h1>SEOUL-2077</h1>
    <h2>HANGUL BREACH</h2>
    <p>흘러내리는 한글을 타이핑해서 막아라</p>
    <p style="font-size: 14px; color: rgba(255, 45, 155, 0.7);">
      최고 점수: <span id="best-score-start">0</span>
    </p>
    <button id="start-btn">[ 게임 시작 ]</button>
  </div>

  <div id="game-container">
    <div id="countdown">
      <div id="countdown-text">3</div>
    </div>
    <div id="gameover">
      <h1>GAME OVER</h1>
      <p>최종 점수: <span id="final-score">0</span></p>
      <p style="font-size: 16px; color: #00ffff;">
        최고 점수: <span id="best-score">0</span>
      </p>
      <button id="restart-btn">[ 재시작 ]</button>
      <button id="screenshot-btn">[ 스크린샷 저장 ]</button> <!-- ← 이 줄 추가 -->
    </div>

<div id="hud">
  <span>SCORE: <strong id="score">0</strong></span>
  <span>LEVEL: <strong id="level">1</strong></span>
  <span>TIME: <strong id="game-time">0s</strong></span>
  <span>COMBO: <strong id="combo">x1</strong></span>
  <span>DIFFICULTY: <strong id="difficulty">Lv1</strong></span>
  <span>HP: <strong id="hp">100</strong></span>
</div>

    <div id="game-area">
      <!-- 단어들이 여기서 떨어져 -->
    </div>


    <div id="robot-helper">
      <svg id="robot-svg" viewBox="0 0 60 80" xmlns="http://www.w3.org/2000/svg" width="50" height="70">
        <!-- 머리 -->
        <rect x="10" y="5" width="40" height="30" fill="none" stroke="#00ffff" stroke-width="2" />
        <!-- 눈 왼쪽 -->
        <circle cx="20" cy="15" r="3" fill="#ff2d9b" />
        <!-- 눈 오른쪽 -->
        <circle cx="40" cy="15" r="3" fill="#ff2d9b" />
        <!-- 입 -->
        <line x1="22" y1="25" x2="38" y2="25" stroke="#ff2d9b" stroke-width="1" />

        <!-- 몸통 -->
        <rect x="15" y="38" width="30" height="35" fill="none" stroke="#ff2d9b" stroke-width="2" />
        <!-- 가슴 라인 -->
        <line x1="30" y1="38" x2="30" y2="73" stroke="#00ffff" stroke-width="1" />

        <!-- 팔 왼쪽 -->
        <line x1="15" y1="45" x2="5" y2="50" stroke="#00ffff" stroke-width="2" />
        <!-- 팔 오른쪽 -->
        <line x1="45" y1="45" x2="55" y2="50" stroke="#00ffff" stroke-width="2" />
      </svg>
    </div>

    <div id="input-zone">
      <input type="text" id="type-input" placeholder="여기에 타이핑..." autocomplete="off" />
    </div>

  </div>

  <script src="words.js"></script>
  <script src="script.js"></script>
</body>

</html>
